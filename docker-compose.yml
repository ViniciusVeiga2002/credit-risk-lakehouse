services:
  postgres:
    image: postgres:16
    container_name: credit-risk-postgres
    environment:
      POSTGRES_DB: credit_risk
      POSTGRES_USER: credit_user
      POSTGRES_PASSWORD: credit_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - credit-risk-network

  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: credit-risk-spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host spark-master
      --port 7077
      --webui-port 8080
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    networks:
      - credit-risk-network

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: credit-risk-spark-worker
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
      --cores 2
      --memory 2G
      --webui-port 8081
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    networks:
      - credit-risk-network

  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter/Dockerfile
    container_name: credit-risk-jupyter
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ./docs:/app/docs
    depends_on:
      - spark-master
      - spark-worker
      - postgres
    networks:
      - credit-risk-network

volumes:
  postgres_data:

networks:
  credit-risk-network:
    driver: bridge